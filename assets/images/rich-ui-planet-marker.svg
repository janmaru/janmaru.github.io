<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .term { fill: #1e1e1e; stroke: #2d2d2d; }
      .titlebar { fill: #2d2d2d; }
      .dot-r { fill: #ff5f56; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #27c93f; }
      .grid-text { fill: #888; font-size: 11px; }
      .legend { fill: #9cdcfe; font-size: 12px; }
      .center-bad  { fill: #3793e6; font-size: 26px; }
      .center-good { fill: #3793e6; font-size: 24px; }
      .vgr1 { fill: #d062d0; font-size: 16px; }
      .vgr2 { fill: #dccc44; font-size: 16px; }
      .trail { fill: #888; font-size: 14px; }
      .caption { font-family: -apple-system, system-ui, sans-serif; }
      .caption-bad  { fill: #cf222e; font-size: 13px; font-weight: 600; }
      .caption-good { fill: #1a7f37; font-size: 13px; font-weight: 600; }
      .codepoint { fill: #57606a; font-size: 11px; font-family: ui-monospace, monospace; }
    </style>
  </defs>

  <!-- LEFT: BEFORE -->
  <g>
    <rect class="term" x="20" y="20" width="400" height="240" rx="6"/>
    <rect class="titlebar" x="20" y="20" width="400" height="20" rx="6"/>
    <rect class="titlebar" x="20" y="32" width="400" height="8"/>
    <circle class="dot-r" cx="34" cy="30" r="4"/>
    <circle class="dot-y" cx="48" cy="30" r="4"/>
    <circle class="dot-g" cx="62" cy="30" r="4"/>

    <text class="grid-text" x="34" y="62">scatter_2d  ·  plane xy</text>

    <!-- VGR1 trail (left arc) -->
    <text class="trail" x="100" y="180">·</text>
    <text class="trail" x="118" y="172">·</text>
    <text class="trail" x="136" y="162">·</text>
    <text class="trail" x="154" y="152">·</text>
    <text class="trail" x="172" y="142">·</text>
    <text class="vgr1"  x="186" y="132">◆</text>

    <!-- VGR2 trail (right arc) -->
    <text class="trail" x="262" y="118">·</text>
    <text class="trail" x="282" y="132">·</text>
    <text class="trail" x="302" y="146">·</text>
    <text class="trail" x="322" y="160">·</text>
    <text class="vgr2"  x="340" y="172">▲</text>

    <!-- Center -->
    <text class="center-bad" x="222" y="170">⊙</text>

    <text class="legend" x="34" y="232">⊙ Earth    ◆ VGR1    ▲ VGR2</text>
  </g>
  <text class="caption caption-bad" x="20" y="290">before</text>
  <text class="codepoint" x="20" y="312">marker = "\u2299"  —  U+2299  CIRCLED DOT OPERATOR</text>

  <!-- RIGHT: AFTER -->
  <g>
    <rect class="term" x="460" y="20" width="400" height="240" rx="6"/>
    <rect class="titlebar" x="460" y="20" width="400" height="20" rx="6"/>
    <rect class="titlebar" x="460" y="32" width="400" height="8"/>
    <circle class="dot-r" cx="474" cy="30" r="4"/>
    <circle class="dot-y" cx="488" cy="30" r="4"/>
    <circle class="dot-g" cx="502" cy="30" r="4"/>

    <text class="grid-text" x="474" y="62">scatter_2d  ·  plane xy</text>

    <text class="trail" x="540" y="180">·</text>
    <text class="trail" x="558" y="172">·</text>
    <text class="trail" x="576" y="162">·</text>
    <text class="trail" x="594" y="152">·</text>
    <text class="trail" x="612" y="142">·</text>
    <text class="vgr1"  x="626" y="132">◆</text>

    <text class="trail" x="702" y="118">·</text>
    <text class="trail" x="722" y="132">·</text>
    <text class="trail" x="742" y="146">·</text>
    <text class="trail" x="762" y="160">·</text>
    <text class="vgr2"  x="780" y="172">▲</text>

    <text class="center-good" x="664" y="170">●</text>

    <text class="legend" x="474" y="232">● Earth    ◆ VGR1    ▲ VGR2</text>
  </g>
  <text class="caption caption-good" x="460" y="290">after</text>
  <text class="codepoint" x="460" y="312">marker = "\u25cf"  —  U+25CF  BLACK CIRCLE</text>
</svg>

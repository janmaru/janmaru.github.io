<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .panel    { fill: #f6f8fa; stroke: #d0d7de; }
      .json     { fill: #1e1e1e; }
      .json-t   { fill: #d4d4d4; font-family: ui-monospace, monospace; font-size: 13px; }
      .json-k   { fill: #9cdcfe; font-family: ui-monospace, monospace; font-size: 13px; }
      .json-s   { fill: #ce9178; font-family: ui-monospace, monospace; font-size: 13px; }
      .label    { fill: #24292f; font-size: 14px; font-weight: 600; }
      .sub      { fill: #57606a; font-size: 12px; }
      .read-yes { fill: #1a7f37; font-size: 11px; font-weight: 700; font-family: ui-monospace, monospace; }
      .read-no  { fill: #cf222e; font-size: 11px; font-weight: 700; font-family: ui-monospace, monospace; }
      .arrow    { stroke: #57606a; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
  </defs>

  <!-- DSL JSON box -->
  <rect class="json" x="320" y="20" width="240" height="130" rx="6"/>
  <text class="json-t" x="334" y="46">{</text>
  <text class="json-k" x="350" y="68">"label"</text>
  <text class="json-t" x="408" y="68">:</text>
  <text class="json-s" x="418" y="68">"Earth"</text>
  <text class="json-t" x="464" y="68">,</text>
  <text class="json-k" x="350" y="88">"marker"</text>
  <text class="json-t" x="412" y="88">:</text>
  <text class="json-s" x="422" y="88">"\u25cf"</text>
  <text class="json-t" x="450" y="88">,</text>
  <text class="json-k" x="350" y="108">"shape"</text>
  <text class="json-t" x="404" y="108">:</text>
  <text class="json-s" x="414" y="108">"ringed"</text>
  <text class="json-t" x="334" y="130">}</text>
  <text class="sub" x="334" y="148">center (DSL fragment)</text>

  <!-- Arrows -->
  <path class="arrow" d="M380 155 Q260 200 200 240" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M500 155 Q620 200 680 240" marker-end="url(#arrowhead)"/>

  <!-- LEFT: TUI -->
  <rect class="panel" x="40" y="250" width="320" height="170" rx="6"/>
  <text class="label" x="56" y="274">Terminal renderer (TUI)</text>
  <text class="sub"   x="56" y="292">rich_ui/renderer.py · 1 codepoint per cell</text>

  <text class="read-yes" x="56"  y="316">marker   ✓ read</text>
  <text class="read-no"  x="190" y="316">shape    ✗ ignored</text>

  <rect x="56" y="328" width="288" height="78" fill="#1e1e1e" rx="4"/>
  <text fill="#3793e6" font-family="ui-monospace, monospace" font-size="34" x="190" y="378">●</text>

  <!-- RIGHT: Tk -->
  <rect class="panel" x="520" y="250" width="320" height="170" rx="6"/>
  <text class="label" x="536" y="274">Native viewer (Tkinter)</text>
  <text class="sub"   x="536" y="292">examples/common/tk_scatter_viewer.py · pixels</text>

  <text class="read-yes" x="536" y="316">shape    ✓ read</text>
  <text class="sub"      x="660" y="316" font-family="ui-monospace, monospace">(marker → legend hint)</text>

  <rect x="536" y="328" width="288" height="78" fill="#ffffff" stroke="#d0d7de" rx="4"/>
  <circle cx="680" cy="367" r="16" fill="none" stroke="#3793e6" stroke-width="2.5"/>
  <circle cx="680" cy="367" r="4"  fill="#3793e6"/>
</svg>

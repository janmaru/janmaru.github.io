<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Janmaru</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    {% if page.extra_css %}
    <style>{{ page.extra_css }}</style>
    {% endif %}
</head>
<body>
    <header>
        <h1><a href="{{ '/' | relative_url }}" style="text-decoration:none; color:inherit;">JANMARU</a></h1>
        <nav>
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/categories/llm' | relative_url }}">LLM</a>
            <a href="{{ '/about' | relative_url }}">About</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme">&#9790;</button>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        &copy; {{ site.time | date: '%Y' }} Mauro Ghiani. Empty space is where thought is born.
    </footer>
    <script>
    (function() {
        var btn = document.getElementById('theme-toggle');
        var body = document.body;
        var stored = localStorage.getItem('theme');
        if (stored === 'light') {
            body.classList.add('light-theme');
            btn.innerHTML = '&#9728;';
        }
        btn.addEventListener('click', function() {
            body.classList.toggle('light-theme');
            var isLight = body.classList.contains('light-theme');
            btn.innerHTML = isLight ? '&#9728;' : '&#9790;';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    })();
    </script>
</body>
</html>

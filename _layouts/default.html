<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 30 }}">
    <meta name="author" content="{{ site.author }}">
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true},{left: '$', right: '$', display: false}]});"></script>
    <title>{{ page.title }} - Janmaru</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    {% if page.extra_css %}
    <style>{{ page.extra_css }}</style>
    {% endif %}
</head>
<body>
    <header>
        <h1><a href="{{ '/' | relative_url }}" class="site-title"><span class="title-jan">JAN</span><span class="title-maru">MARU</span></a></h1>
        <nav>
            <a href="{{ '/' | relative_url }}"><span class="hotkey">H</span>ome</a>
            <a href="{{ '/categories/ai' | relative_url }}">A<span class="hotkey">I</span></a>
            <a href="{{ '/categories/philosophy' | relative_url }}"><span class="hotkey">P</span>hilosophy</a>
            <a href="{{ '/categories/odds' | relative_url }}"><span class="hotkey">O</span>dds</a>
            <a href="{{ '/about' | relative_url }}"><span class="hotkey">A</span>bout</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme"><span class="hotkey">D</span>ark</button>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        &copy; {{ site.time | date: '%Y' }} Mauro Ghiani. Empty space is where thought is born.
    </footer>
    <script>
    (function() {
        var btn = document.getElementById('theme-toggle');
        var body = document.body;
        var stored = localStorage.getItem('theme');
        function setLabel(isLight) {
            btn.innerHTML = isLight
                ? '<span class="hotkey">L</span>ight'
                : '<span class="hotkey">D</span>ark';
        }
        if (stored === 'light') {
            body.classList.add('light-theme');
            setLabel(true);
        }
        btn.addEventListener('click', function() {
            body.classList.toggle('light-theme');
            var isLight = body.classList.contains('light-theme');
            setLabel(isLight);
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    })();
    </script>
</body>
</html>
